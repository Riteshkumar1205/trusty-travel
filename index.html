<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Branding -->
    <title>SAARTHI — Guiding Trust Across Distance</title>

    <meta
      name="description"
      content="SAARTHI is a trusted human mobility platform connecting travelers and senders for secure, responsible, and real-time transportation."
    />

    <meta name="author" content="SAARTHI" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (Used when sharing links on WhatsApp, LinkedIn, etc.) -->
    <meta property="og:title" content="SAARTHI — Guiding Trust Across Distance" />
    <meta
      property="og:description"
      content="A trust-first mobility network transforming everyday journeys into secure transportation."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com" />

    <!-- Replace with your future banner/logo -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SAARTHI" />
    <meta
      name="twitter:description"
      content="Guiding trust across distance."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="SAARTHI - Guiding Trust Across Distance" />

    <!-- Theme Color (Mobile browser top bar color) -->
    <meta name="theme-color" content="#0E1A2B" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SAARTHI",
      "url": "https://your-domain.com",
      "logo": "https://your-domain.com/og-image.png",
      "description": "A trusted human mobility platform connecting travelers and senders for secure, responsible, and real-time transportation.",
      "slogan": "Guiding Trust Across Distance",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SAARTHI",
      "url": "https://your-domain.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://your-domain.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
